name: Sync Source to Public Repo

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          path: private

      - name: Checkout public repo
        uses: actions/checkout@v4
        with:
          repository: Evan816Z/profile
          token: ${{ secrets.PUBLIC_REPO_PAT }}
          path: public

      - name: Sync source files to public repo
        run: |
          cd private
          rsync -av --delete \
            --exclude='.git' \
            --exclude='.github/workflows' \
            --exclude='src/data/default.ts' \
            --exclude='public/*.txt' \
            --exclude='CNAME' \
            --exclude='README.md' \
            ./ ../public/

      - name: Commit and push to public repo
        run: |
          cd public
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to sync"
          else
            git commit -m "sync: 从私人仓库同步源代码更新"
            git push
          fi
